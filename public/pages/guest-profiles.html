<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guest Profiles - L'Arche</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-content">
      <div class="logo">
        <img src="/logo.svg" alt="L'Arche" class="logo-img">
        <h1>L'<span>Arche</span></h1>
      </div>
      <ul class="nav-menu">
        <li><a href="/"><i class="fas fa-home"></i> Dashboard</a></li>
        <li><a href="/hotel-profile"><i class="fas fa-building"></i> Hotel Profile</a></li>
        <li><a href="/venues-profiles"><i class="fas fa-map-marker-alt"></i> Venues</a></li>
        <li><a href="/room-management"><i class="fas fa-bed"></i> Rooms</a></li>
        <li><a href="/booking-reservations"><i class="fas fa-calendar-check"></i> Bookings</a></li>
        <li><a href="/guest-profiles" class="active"><i class="fas fa-users"></i> Guests</a></li>
        <li><a href="/service-requests"><i class="fas fa-concierge-bell"></i> Services</a></li>
        <li><a href="/specials"><i class="fas fa-star"></i> Specials</a></li>
      </ul>
    </div>
  </nav>

  <div class="main-content">
    <div class="page-header">
      <h2><i class="fas fa-users"></i> Guest Profiles</h2>
      <p>Manage guest information and preferences</p>
    </div>

    <div class="card">
      <div class="card-header">
        <h3>Guest Directory</h3>
        <div style="display: flex; gap: 1rem;">
          <input type="text" class="form-control" style="width: 250px;" placeholder="Search guests..." id="search-input" oninput="searchGuests()">
          <button class="btn btn-primary" onclick="openModal('add-guest-modal')">
            <i class="fas fa-plus"></i> Add Guest
          </button>
        </div>
      </div>
      <div class="table-responsive">
        <table class="table" id="guests-table">
          <thead>
            <tr>
              <th>Guest</th>
              <th>Email</th>
              <th>Phone</th>
              <th>VIP Status</th>
              <th>Total Stays</th>
              <th>Last Visit</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="7" class="empty-state">Loading guests...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Add/Edit Guest Modal -->
  <div class="modal-overlay" id="add-guest-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="guest-modal-title">Add New Guest</h3>
        <button class="modal-close" onclick="closeModal('add-guest-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="guest-form">
          <input type="hidden" name="id" id="guest-id">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" class="form-control" name="name" required>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>Email</label>
              <input type="email" class="form-control" name="email" required>
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="tel" class="form-control" name="phone" required>
            </div>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>Date of Birth</label>
              <input type="date" class="form-control" name="dateOfBirth">
            </div>
            <div class="form-group">
              <label>Nationality</label>
              <input type="text" class="form-control" name="nationality">
            </div>
          </div>
          <div class="form-group">
            <label>Address</label>
            <textarea class="form-control" name="address" rows="2"></textarea>
          </div>
          <div class="form-group">
            <label>ID Type</label>
            <select class="form-control" name="idType">
              <option value="passport">Passport</option>
              <option value="driver_license">Driver's License</option>
              <option value="national_id">National ID</option>
            </select>
          </div>
          <div class="form-group">
            <label>ID Number</label>
            <input type="text" class="form-control" name="idNumber">
          </div>
          <div class="form-group">
            <label>VIP Status</label>
            <select class="form-control" name="vipStatus">
              <option value="regular">Regular</option>
              <option value="silver">Silver</option>
              <option value="gold">Gold</option>
              <option value="platinum">Platinum</option>
            </select>
          </div>
          <div class="form-group">
            <label>Preferences</label>
            <textarea class="form-control" name="preferences" rows="3" placeholder="Room preferences, dietary requirements, etc."></textarea>
          </div>
          <div class="form-group">
            <label>Notes</label>
            <textarea class="form-control" name="notes" rows="2"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('add-guest-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveGuest()">Save Guest</button>
      </div>
    </div>
  </div>

  <!-- Guest Details Modal -->
  <div class="modal-overlay" id="guest-details-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Guest Details</h3>
        <button class="modal-close" onclick="closeModal('guest-details-modal')">&times;</button>
      </div>
      <div class="modal-body" id="guest-details-content">
        <!-- Content will be loaded dynamically -->
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/app.js"></script>
  <script>
    let guests = [];

    async function loadGuests() {
      try {
        guests = await apiRequest('/api/guests');
        renderGuests();
      } catch (error) {
        console.error('Error loading guests:', error);
      }
    }

    function renderGuests(filteredGuests = null) {
      const tbody = document.querySelector('#guests-table tbody');
      const data = filteredGuests || guests;
      
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No guests found</td></tr>';
        return;
      }
      
      tbody.innerHTML = data.map(guest => `
        <tr>
          <td>
            <div style="display: flex; align-items: center; gap: 0.75rem;">
              <div style="width: 40px; height: 40px; background: var(--primary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600;">
                ${(guest.name || 'N').charAt(0).toUpperCase()}
              </div>
              <div>
                <strong>${guest.name}</strong>
              </div>
            </div>
          </td>
          <td>${guest.email || 'N/A'}</td>
          <td>${guest.phone || 'N/A'}</td>
          <td><span class="badge badge-${getVipClass(guest.vipStatus)}">${guest.vipStatus || 'Regular'}</span></td>
          <td>${guest.totalStays || 0}</td>
          <td>${formatDate(guest.lastVisit)}</td>
          <td>
            <button class="btn btn-sm btn-secondary" onclick="viewGuest('${guest.id}')" title="View Details">
              <i class="fas fa-eye"></i>
            </button>
            <button class="btn btn-sm btn-secondary" onclick="editGuest('${guest.id}')" title="Edit">
              <i class="fas fa-edit"></i>
            </button>
            <button class="btn btn-sm btn-danger" onclick="deleteGuest('${guest.id}')" title="Delete">
              <i class="fas fa-trash"></i>
            </button>
          </td>
        </tr>
      `).join('');
    }

    function getVipClass(status) {
      const map = {
        'regular': 'info',
        'silver': 'warning',
        'gold': 'success',
        'platinum': 'danger'
      };
      return map[status] || 'info';
    }

    async function searchGuests() {
      const query = document.getElementById('search-input').value.toLowerCase();
      if (!query) {
        renderGuests();
        return;
      }
      
      const filtered = guests.filter(g => 
        g.name?.toLowerCase().includes(query) ||
        g.email?.toLowerCase().includes(query) ||
        g.phone?.includes(query)
      );
      renderGuests(filtered);
    }

    async function saveGuest() {
      const form = document.getElementById('guest-form');
      const id = document.getElementById('guest-id').value;
      const formData = new FormData(form);
      const data = Object.fromEntries(formData);
      
      try {
        if (id) {
          await apiRequest(`/api/guests/${id}`, 'PUT', data);
          showToast('Guest updated successfully', 'success');
        } else {
          await apiRequest('/api/guests', 'POST', data);
          showToast('Guest added successfully', 'success');
        }
        closeModal('add-guest-modal');
        form.reset();
        loadGuests();
      } catch (error) {
        showToast('Error saving guest', 'error');
      }
    }

    function editGuest(id) {
      const guest = guests.find(g => g.id === id);
      if (!guest) return;
      
      document.getElementById('guest-modal-title').textContent = 'Edit Guest';
      document.getElementById('guest-id').value = id;
      
      const form = document.getElementById('guest-form');
      Object.keys(guest).forEach(key => {
        const input = form.querySelector(`[name="${key}"]`);
        if (input) input.value = guest[key];
      });
      
      openModal('add-guest-modal');
    }

    function viewGuest(id) {
      const guest = guests.find(g => g.id === id);
      if (!guest) return;
      
      const content = document.getElementById('guest-details-content');
      content.innerHTML = `
        <div style="text-align: center; margin-bottom: 1.5rem;">
          <div style="width: 80px; height: 80px; background: var(--primary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem; font-weight: 600; margin: 0 auto 1rem;">
            ${(guest.name || 'N').charAt(0).toUpperCase()}
          </div>
          <h3>${guest.name}</h3>
          <span class="badge badge-${getVipClass(guest.vipStatus)}">${guest.vipStatus || 'Regular'} Member</span>
        </div>
        <div class="grid-2">
          <div><strong>Email:</strong> ${guest.email || 'N/A'}</div>
          <div><strong>Phone:</strong> ${guest.phone || 'N/A'}</div>
          <div><strong>Nationality:</strong> ${guest.nationality || 'N/A'}</div>
          <div><strong>Total Stays:</strong> ${guest.totalStays || 0}</div>
        </div>
        ${guest.preferences ? `<div style="margin-top: 1rem;"><strong>Preferences:</strong><p>${guest.preferences}</p></div>` : ''}
        ${guest.notes ? `<div style="margin-top: 1rem;"><strong>Notes:</strong><p>${guest.notes}</p></div>` : ''}
      `;
      
      openModal('guest-details-modal');
    }

    async function deleteGuest(id) {
      if (!confirm('Are you sure you want to delete this guest?')) return;
      
      try {
        await apiRequest(`/api/guests/${id}`, 'DELETE');
        showToast('Guest deleted successfully', 'success');
        loadGuests();
      } catch (error) {
        showToast('Error deleting guest', 'error');
      }
    }

    document.addEventListener('DOMContentLoaded', loadGuests);
  </script>
</body>
</html>
