<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room Management - L'Arche</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-content">
      <div class="logo">
        <span class="logo-icon">🏨</span>
        <h1>L'<span>Arche</span></h1>
      </div>
      <ul class="nav-menu">
        <li><a href="/"><i class="fas fa-home"></i> Dashboard</a></li>
        <li><a href="/hotel-profile"><i class="fas fa-building"></i> Hotel Profile</a></li>
        <li><a href="/venues-profiles"><i class="fas fa-map-marker-alt"></i> Venues</a></li>
        <li><a href="/room-management" class="active"><i class="fas fa-bed"></i> Rooms</a></li>
        <li><a href="/booking-reservations"><i class="fas fa-calendar-check"></i> Bookings</a></li>
        <li><a href="/guest-profiles"><i class="fas fa-users"></i> Guests</a></li>
        <li><a href="/service-requests"><i class="fas fa-concierge-bell"></i> Services</a></li>
        <li><a href="/specials"><i class="fas fa-star"></i> Specials</a></li>
      </ul>
    </div>
  </nav>

  <div class="main-content">
    <div class="page-header">
      <h2><i class="fas fa-bed"></i> Room Management</h2>
      <p>Manage your hotel rooms and availability</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon blue">
          <i class="fas fa-bed"></i>
        </div>
        <div class="stat-info">
          <h4 id="stat-total">0</h4>
          <p>Total Rooms</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">
          <i class="fas fa-check-circle"></i>
        </div>
        <div class="stat-info">
          <h4 id="stat-available">0</h4>
          <p>Available</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon orange">
          <i class="fas fa-user"></i>
        </div>
        <div class="stat-info">
          <h4 id="stat-occupied">0</h4>
          <p>Occupied</p>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon purple">
          <i class="fas fa-tools"></i>
        </div>
        <div class="stat-info">
          <h4 id="stat-maintenance">0</h4>
          <p>Maintenance</p>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h3>Room List</h3>
        <div style="display: flex; gap: 1rem;">
          <select class="form-control" style="width: auto;" id="filter-status" onchange="filterRooms()">
            <option value="">All Status</option>
            <option value="available">Available</option>
            <option value="occupied">Occupied</option>
            <option value="maintenance">Maintenance</option>
          </select>
          <select class="form-control" style="width: auto;" id="filter-type" onchange="filterRooms()">
            <option value="">All Types</option>
            <option value="standard">Standard</option>
            <option value="deluxe">Deluxe</option>
            <option value="suite">Suite</option>
            <option value="presidential">Presidential</option>
          </select>
          <button class="btn btn-primary" onclick="openModal('add-room-modal')">
            <i class="fas fa-plus"></i> Add Room
          </button>
        </div>
      </div>
      <div class="grid-4" id="rooms-grid">
        <!-- Room cards will be loaded dynamically -->
      </div>
    </div>
  </div>

  <!-- Add/Edit Room Modal -->
  <div class="modal-overlay" id="add-room-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="room-modal-title">Add New Room</h3>
        <button class="modal-close" onclick="closeModal('add-room-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="room-form">
          <input type="hidden" name="id" id="room-id">
          <div class="grid-2">
            <div class="form-group">
              <label>Room Number</label>
              <input type="text" class="form-control" name="roomNumber" required>
            </div>
            <div class="form-group">
              <label>Floor</label>
              <input type="number" class="form-control" name="floor" required>
            </div>
          </div>
          <div class="form-group">
            <label>Room Type</label>
            <select class="form-control" name="type" required>
              <option value="">Select Type</option>
              <option value="standard">Standard Room</option>
              <option value="deluxe">Deluxe Room</option>
              <option value="suite">Suite</option>
              <option value="presidential">Presidential Suite</option>
            </select>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>Price per Night ($)</label>
              <input type="number" class="form-control" name="price" step="0.01" required>
            </div>
            <div class="form-group">
              <label>Max Occupancy</label>
              <input type="number" class="form-control" name="maxOccupancy" value="2" required>
            </div>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea class="form-control" name="description" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label>Amenities (comma separated)</label>
            <input type="text" class="form-control" name="amenities" placeholder="TV, AC, Mini Bar, Safe">
          </div>
          <div class="form-group">
            <label>Status</label>
            <select class="form-control" name="status">
              <option value="available">Available</option>
              <option value="occupied">Occupied</option>
              <option value="maintenance">Maintenance</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('add-room-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveRoom()">Save Room</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/app.js"></script>
  <script>
    let rooms = [];

    async function loadRooms() {
      try {
        rooms = await apiRequest('/api/rooms');
        updateStats();
        renderRooms();
      } catch (error) {
        console.error('Error loading rooms:', error);
      }
    }

    function updateStats() {
      document.getElementById('stat-total').textContent = rooms.length;
      document.getElementById('stat-available').textContent = rooms.filter(r => r.status === 'available').length;
      document.getElementById('stat-occupied').textContent = rooms.filter(r => r.status === 'occupied').length;
      document.getElementById('stat-maintenance').textContent = rooms.filter(r => r.status === 'maintenance').length;
    }

    function renderRooms() {
      const grid = document.getElementById('rooms-grid');
      const statusFilter = document.getElementById('filter-status').value;
      const typeFilter = document.getElementById('filter-type').value;
      
      let filteredRooms = rooms;
      if (statusFilter) filteredRooms = filteredRooms.filter(r => r.status === statusFilter);
      if (typeFilter) filteredRooms = filteredRooms.filter(r => r.type === typeFilter);
      
      if (filteredRooms.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><i class="fas fa-bed"></i><h4>No rooms found</h4></div>';
        return;
      }
      
      grid.innerHTML = filteredRooms.map(room => `
        <div class="room-card">
          <div class="room-image" style="background: linear-gradient(135deg, ${getRoomColor(room.type)});">
            <i class="fas fa-bed"></i>
          </div>
          <div class="room-info">
            <h4>Room ${room.roomNumber}</h4>
            <p style="color: var(--text-secondary); text-transform: capitalize;">${room.type} - Floor ${room.floor}</p>
            <p class="price">${formatCurrency(room.price)}/night</p>
            <div class="amenities">
              ${(room.amenities || []).slice(0, 3).map(a => `<span class="amenity-tag">${a}</span>`).join('')}
            </div>
            <div style="margin-top: 1rem; display: flex; justify-content: space-between; align-items: center;">
              <span class="badge badge-${getStatusClass(room.status)}">${room.status}</span>
              <div>
                <button class="btn btn-sm btn-secondary" onclick="editRoom('${room.id}')">
                  <i class="fas fa-edit"></i>
                </button>
                <button class="btn btn-sm btn-danger" onclick="deleteRoom('${room.id}')">
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function getRoomColor(type) {
      const colors = {
        'standard': '#667eea, #764ba2',
        'deluxe': '#11998e, #38ef7d',
        'suite': '#f093fb, #f5576c',
        'presidential': '#d4af37, #aa8c2c'
      };
      return colors[type] || '#667eea, #764ba2';
    }

    function filterRooms() {
      renderRooms();
    }

    async function saveRoom() {
      const form = document.getElementById('room-form');
      const id = document.getElementById('room-id').value;
      const formData = new FormData(form);
      const data = Object.fromEntries(formData);
      
      if (data.amenities) {
        data.amenities = data.amenities.split(',').map(a => a.trim());
      }
      data.price = parseFloat(data.price);
      data.floor = parseInt(data.floor);
      data.maxOccupancy = parseInt(data.maxOccupancy);
      
      try {
        if (id) {
          await apiRequest(`/api/rooms/${id}`, 'PUT', data);
          showToast('Room updated successfully', 'success');
        } else {
          await apiRequest('/api/rooms', 'POST', data);
          showToast('Room added successfully', 'success');
        }
        closeModal('add-room-modal');
        form.reset();
        loadRooms();
      } catch (error) {
        showToast('Error saving room', 'error');
      }
    }

    function editRoom(id) {
      const room = rooms.find(r => r.id === id);
      if (!room) return;
      
      document.getElementById('room-modal-title').textContent = 'Edit Room';
      document.getElementById('room-id').value = id;
      
      const form = document.getElementById('room-form');
      Object.keys(room).forEach(key => {
        const input = form.querySelector(`[name="${key}"]`);
        if (input) {
          if (key === 'amenities' && Array.isArray(room[key])) {
            input.value = room[key].join(', ');
          } else {
            input.value = room[key];
          }
        }
      });
      
      openModal('add-room-modal');
    }

    async function deleteRoom(id) {
      if (!confirm('Are you sure you want to delete this room?')) return;
      
      try {
        await apiRequest(`/api/rooms/${id}`, 'DELETE');
        showToast('Room deleted successfully', 'success');
        loadRooms();
      } catch (error) {
        showToast('Error deleting room', 'error');
      }
    }

    document.addEventListener('DOMContentLoaded', loadRooms);
  </script>
</body>
</html>
