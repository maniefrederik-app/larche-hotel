<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venues Profiles - L'Arche</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-content">
      <div class="logo">
        <img src="/logo1.png" alt="L'Arche" class="logo-img">
        <h1>L'<span>Arche</span></h1>
      </div>
      <ul class="nav-menu">
        <li><a href="/"><i class="fas fa-home"></i> Dashboard</a></li>
        <li><a href="/hotel-profile"><i class="fas fa-building"></i> Hotel Profile</a></li>
        <li><a href="/venues-profiles" class="active"><i class="fas fa-map-marker-alt"></i> Venues</a></li>
        <li><a href="/room-management"><i class="fas fa-bed"></i> Rooms</a></li>
        <li><a href="/booking-reservations"><i class="fas fa-calendar-check"></i> Bookings</a></li>
        <li><a href="/guest-profiles"><i class="fas fa-users"></i> Guests</a></li>
        <li><a href="/service-requests"><i class="fas fa-concierge-bell"></i> Services</a></li>
        <li><a href="/specials"><i class="fas fa-star"></i> Specials</a></li>
      </ul>
    </div>
  </nav>

  <div class="main-content">
    <div class="page-header">
      <h2><i class="fas fa-map-marker-alt"></i> Venues Profiles</h2>
      <p>Explore our beautiful event venues</p>
    </div>

    <div class="grid-3" id="venues-grid">
      <!-- Venue cards will be loaded dynamically -->
    </div>

    <div class="card" style="margin-top: 2rem;">
      <div class="card-header">
        <h3>All Venues</h3>
        <button class="btn btn-primary" onclick="openModal('add-venue-modal')">
          <i class="fas fa-plus"></i> Add New Venue
        </button>
      </div>
      <div class="table-responsive">
        <table class="table" id="venues-table">
          <thead>
            <tr>
              <th>Venue Name</th>
              <th>Type</th>
              <th>Capacity</th>
              <th>Price/Hour</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="6" class="empty-state">Loading venues...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Add/Edit Venue Modal -->
  <div class="modal-overlay" id="add-venue-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="venue-modal-title">Add New Venue</h3>
        <button class="modal-close" onclick="closeModal('add-venue-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <form id="venue-form">
          <input type="hidden" name="id" id="venue-id">
          <div class="form-group">
            <label>Venue Name</label>
            <input type="text" class="form-control" name="name" required>
          </div>
          <div class="form-group">
            <label>Venue Type</label>
            <select class="form-control" name="type" required>
              <option value="">Select Type</option>
              <option value="ballroom">Ballroom</option>
              <option value="conference">Conference Room</option>
              <option value="garden">Garden</option>
              <option value="terrace">Terrace</option>
              <option value="banquet">Banquet Hall</option>
              <option value="meeting">Meeting Room</option>
              <option value="outdoor">Outdoor Space</option>
            </select>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>Capacity (Guests)</label>
              <input type="number" class="form-control" name="capacity" required>
            </div>
            <div class="form-group">
              <label>Price per Hour ($)</label>
              <input type="number" class="form-control" name="pricePerHour" step="0.01" required>
            </div>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea class="form-control" name="description" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label>Amenities (comma separated)</label>
            <input type="text" class="form-control" name="amenities" placeholder="Projector, Sound System, Catering">
          </div>
          <div class="form-group">
            <label>Status</label>
            <select class="form-control" name="status">
              <option value="available">Available</option>
              <option value="booked">Booked</option>
              <option value="maintenance">Under Maintenance</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('add-venue-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveVenue()">Save Venue</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/app.js"></script>
  <script>
    let venues = [];

    async function loadVenues() {
      try {
        venues = await apiRequest('/api/venues');
        renderVenues();
        renderVenuesTable();
      } catch (error) {
        console.error('Error loading venues:', error);
      }
    }

    function renderVenues() {
      const grid = document.getElementById('venues-grid');
      
      if (venues.length === 0) {
        grid.innerHTML = '<div class="empty-state"><i class="fas fa-map-marker-alt"></i><h4>No venues yet</h4><p>Add your first venue to get started</p></div>';
        return;
      }
      
      grid.innerHTML = venues.map(venue => `
        <div class="venue-card">
          <div class="venue-image">
            <i class="fas fa-${getVenueIcon(venue.type)}"></i>
          </div>
          <div class="venue-info">
            <h4>${venue.name}</h4>
            <p class="capacity"><i class="fas fa-users"></i> ${venue.capacity} guests</p>
            <p>${venue.description || ''}</p>
            <div style="margin-top: 1rem;">
              <span class="badge badge-${getStatusClass(venue.status)}">${venue.status}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderVenuesTable() {
      const tbody = document.querySelector('#venues-table tbody');
      
      if (venues.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No venues found</td></tr>';
        return;
      }
      
      tbody.innerHTML = venues.map(venue => `
        <tr>
          <td><strong>${venue.name}</strong></td>
          <td>${venue.type}</td>
          <td>${venue.capacity} guests</td>
          <td>${formatCurrency(venue.pricePerHour)}</td>
          <td><span class="badge badge-${getStatusClass(venue.status)}">${venue.status}</span></td>
          <td>
            <button class="btn btn-sm btn-secondary" onclick="editVenue('${venue.id}')">
              <i class="fas fa-edit"></i>
            </button>
            <button class="btn btn-sm btn-danger" onclick="deleteVenue('${venue.id}')">
              <i class="fas fa-trash"></i>
            </button>
          </td>
        </tr>
      `).join('');
    }

    function getVenueIcon(type) {
      const icons = {
        'ballroom': 'champagne-glasses',
        'conference': 'briefcase',
        'garden': 'tree',
        'terrace': 'umbrella-beach',
        'banquet': 'utensils',
        'meeting': 'handshake',
        'outdoor': 'sun'
      };
      return icons[type] || 'building';
    }

    async function saveVenue() {
      const form = document.getElementById('venue-form');
      const id = document.getElementById('venue-id').value;
      const formData = new FormData(form);
      const data = Object.fromEntries(formData);
      
      if (data.amenities) {
        data.amenities = data.amenities.split(',').map(a => a.trim());
      }
      
      try {
        if (id) {
          await apiRequest(`/api/venues/${id}`, 'PUT', data);
          showToast('Venue updated successfully', 'success');
        } else {
          await apiRequest('/api/venues', 'POST', data);
          showToast('Venue added successfully', 'success');
        }
        closeModal('add-venue-modal');
        form.reset();
        loadVenues();
      } catch (error) {
        showToast('Error saving venue', 'error');
      }
    }

    function editVenue(id) {
      const venue = venues.find(v => v.id === id);
      if (!venue) return;
      
      document.getElementById('venue-modal-title').textContent = 'Edit Venue';
      document.getElementById('venue-id').value = id;
      
      const form = document.getElementById('venue-form');
      Object.keys(venue).forEach(key => {
        const input = form.querySelector(`[name="${key}"]`);
        if (input) {
          if (key === 'amenities' && Array.isArray(venue[key])) {
            input.value = venue[key].join(', ');
          } else {
            input.value = venue[key];
          }
        }
      });
      
      openModal('add-venue-modal');
    }

    async function deleteVenue(id) {
      if (!confirm('Are you sure you want to delete this venue?')) return;
      
      try {
        await apiRequest(`/api/venues/${id}`, 'DELETE');
        showToast('Venue deleted successfully', 'success');
        loadVenues();
      } catch (error) {
        showToast('Error deleting venue', 'error');
      }
    }

    document.addEventListener('DOMContentLoaded', loadVenues);
  </script>
</body>
</html>
